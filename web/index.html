<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="IDR Peixe - Gerencie sua produção aquícola de forma simples e inteligente. App completo para controle de lotes, biometrias, alimentação e relatórios.">
  <meta name="keywords"
    content="aquicultura, piscicultura, gestão de peixes, app aquicultura, IDR Peixe, controle de produção">
  <meta name="author" content="IDR Peixe">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="IDR Peixe - Gestão Inteligente de Aquicultura">
  <meta property="og:description"
    content="Gerencie sua produção aquícola de forma simples e inteligente com gráficos, relatórios, controle de lotes e muito mais.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="IDR Peixe - Gestão Inteligente de Aquicultura">
  <meta name="twitter:description" content="Gerencie sua produção aquícola de forma simples e inteligente.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="IDR Peixe">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>IDR Peixe - Gestão Inteligente de Aquicultura</title>
  <link rel="manifest" href="manifest.json">

  <!-- YouTube iframe API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>

<body>
  <script>
    window.addEventListener('load', function (ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>

</html>
